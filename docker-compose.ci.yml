services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: admin_yh
      MYSQL_USER: admin_yh
      MYSQL_PASSWORD: admin_yh
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "33306:3306"

  admin-api:
    build:
      context: .
      dockerfile: Dockerfile.admin-api
      args:
        RUST_IMAGE: ${RUST_IMAGE:-rust:1.88-bookworm}
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-debian:bookworm-slim}
    image: rust-adminyh/admin-api:ci
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: ci
      APP_HTTP__HOST: 0.0.0.0
      APP_HTTP__PORT: 16824
      APP_LOGGING__JSON_LOGS: "true"
      APP_STORAGE__AVATAR_DIR: /app/uploads/avatar
      DATABASE_URL: mysql://admin_yh:admin_yh@mysql:3306/admin_yh
      DATABASE_MAX_CONNECTIONS: 5
      DATABASE_MIN_CONNECTIONS: 1
      DATABASE_CONNECT_TIMEOUT_SECONDS: 10
      DATABASE_MIGRATE_ON_START: "true"
    ports:
      - "16824:16824"

  desktop-web:
    build:
      context: .
      dockerfile: Dockerfile.desktop-web
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-slim}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.27-alpine}
        VITE_API_BASE_URL: /api
    image: rust-adminyh/desktop-web:ci
    depends_on:
      - admin-api
    ports:
      - "18080:80"
