name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Rust gates
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
      - name: Run backend gates
        run: CARGO_OFFLINE=false scripts/test-backend.sh

  frontend:
    name: Frontend gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit and component tests
        run: npm run test
      - name: Production build
        run: npm run build

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E
        run: npm run e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/desktop/web/playwright-report
          if-no-files-found: ignore

  migration:
    name: Migration gates
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
      - name: Run migration gates
        run: CARGO_OFFLINE=false scripts/test-migration.sh

  tauri-app:
    name: Tauri app bundle
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/web/package-lock.json
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> apps/desktop/src-tauri/target
      - name: Install frontend dependencies
        run: npm ci --prefix apps/desktop/web
      - name: Check Tauri runtime contract
        run: scripts/test-tauri-contract.sh
      - name: Build Tauri app bundle
        run: CARGO_NET_OFFLINE=false RUN_TAURI=true scripts/test-tauri-build.sh
      - name: Upload macOS app bundle
        uses: actions/upload-artifact@v4
        with:
          name: tauri-macos-app
          path: apps/desktop/src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error
