name: CI

on:
  workflow_dispatch:
    inputs:
      release_candidate:
        description: "Require all release-candidate gates before heavy release jobs"
        required: true
        default: false
        type: boolean
      run_docker:
        description: "Build Docker images and run compose health checks"
        required: true
        default: false
        type: boolean
      run_docker_e2e:
        description: "After Docker compose starts, run Playwright against nginx + Rust API + MySQL"
        required: true
        default: false
        type: boolean
      run_tauri:
        description: "Build the macOS Tauri .app bundle"
        required: true
        default: false
        type: boolean
      run_tauri_dmg:
        description: "Build the macOS DMG bundle"
        required: true
        default: false
        type: boolean
      run_tauri_sidecar_smoke:
        description: "Launch the bundled admin-api sidecar and verify /api/health"
        required: true
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NPM_REGISTRY: https://registry.npmjs.org

jobs:
  release-candidate-preflight:
    name: Release candidate preflight
    runs-on: ubuntu-latest
    steps:
      - name: Validate release candidate inputs and secret availability
        env:
          RELEASE_CANDIDATE: ${{ inputs.release_candidate }}
          RUN_DOCKER: ${{ inputs.run_docker }}
          RUN_DOCKER_E2E: ${{ inputs.run_docker_e2e }}
          RUN_TAURI: ${{ inputs.run_tauri }}
          RUN_TAURI_DMG: ${{ inputs.run_tauri_dmg }}
          RUN_TAURI_SIDECAR_SMOKE: ${{ inputs.run_tauri_sidecar_smoke }}
          OLD_DATABASE_URL_SET: ${{ secrets.OLD_DATABASE_URL != '' }}
          NEW_DATABASE_URL_SET: ${{ secrets.NEW_DATABASE_URL != '' }}
          NEW_AVATAR_DIR_SET: ${{ secrets.NEW_AVATAR_DIR != '' || vars.NEW_AVATAR_DIR != '' }}
          TAURI_SIDECAR_DATABASE_URL_SET: ${{ secrets.TAURI_SIDECAR_DATABASE_URL != '' || secrets.DATABASE_URL != '' }}
        run: |
          missing=0

          require_toggle() {
            local value="$1"
            local label="$2"
            if [[ "$value" != "true" ]]; then
              echo "FAIL: release_candidate=true requires ${label}."
              missing=1
            fi
          }

          require_present() {
            local value="$1"
            local label="$2"
            if [[ "$value" != "true" ]]; then
              echo "FAIL: release_candidate=true requires ${label}."
              missing=1
            fi
          }

          require_enabled_with_tauri() {
            local value="$1"
            local label="$2"
            if [[ "$value" == "true" && "$RUN_TAURI" != "true" ]]; then
              echo "FAIL: ${label} requires run_tauri=true."
              missing=1
            fi
          }

          require_enabled_with_tauri "$RUN_TAURI_DMG" "run_tauri_dmg=true"
          require_enabled_with_tauri "$RUN_TAURI_SIDECAR_SMOKE" "run_tauri_sidecar_smoke=true"

          if [[ "$RUN_TAURI_SIDECAR_SMOKE" == "true" ]]; then
            require_present "$TAURI_SIDECAR_DATABASE_URL_SET" "TAURI_SIDECAR_DATABASE_URL or DATABASE_URL secret"
          fi

          if [[ "$RELEASE_CANDIDATE" != "true" ]]; then
            if [[ "$missing" -ne 0 ]]; then
              exit 1
            fi
            echo "Release candidate preflight skipped."
            exit 0
          fi

          require_toggle "$RUN_DOCKER" "run_docker=true"
          require_toggle "$RUN_DOCKER_E2E" "run_docker_e2e=true"
          require_toggle "$RUN_TAURI" "run_tauri=true"
          require_toggle "$RUN_TAURI_DMG" "run_tauri_dmg=true"
          require_toggle "$RUN_TAURI_SIDECAR_SMOKE" "run_tauri_sidecar_smoke=true"
          require_present "$OLD_DATABASE_URL_SET" "OLD_DATABASE_URL secret"
          require_present "$NEW_DATABASE_URL_SET" "NEW_DATABASE_URL secret"
          require_present "$NEW_AVATAR_DIR_SET" "NEW_AVATAR_DIR secret or variable"

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

          echo "GitHub release candidate preflight passed."

  backend:
    name: Backend Rust gates
    needs: release-candidate-preflight
    runs-on: ubuntu-latest
    env:
      RELEASE_GATE: ${{ inputs.release_candidate }}
      RUN_DB_TESTS: ${{ inputs.release_candidate }}
      RUN_DB_TESTS_ISOLATED: ${{ inputs.release_candidate }}
      ADMIN_DB_TEST_DATABASE_URL: mysql://admin_yh:admin_yh@127.0.0.1:33319/admin_yh_backend_smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
      - name: Run backend gates
        run: CARGO_OFFLINE=false scripts/test-backend.sh

  frontend:
    name: Frontend gates
    needs: release-candidate-preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/web/package-lock.json
      - name: Run frontend gates
        env:
          RELEASE_GATE: ${{ inputs.release_candidate }}
          RUN_COVERAGE: ${{ inputs.release_candidate }}
          RUN_E2E: "false"
          GITHUB_FRONTEND_E2E_SEPARATE_JOB: "true"
        run: scripts/test-frontend.sh

  frontend-e2e:
    name: Frontend E2E
    needs: release-candidate-preflight
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/web/package-lock.json
      - name: Install dependencies
        run: bash ../../../scripts/install-frontend-deps.sh
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E
        run: npm run e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/desktop/web/playwright-report
          if-no-files-found: ignore

  migration:
    name: Migration gates
    needs: release-candidate-preflight
    runs-on: ubuntu-latest
    env:
      RELEASE_GATE: ${{ inputs.release_candidate }}
      MIGRATION_APPLY: ${{ inputs.release_candidate }}
      RUN_MIGRATION_SMOKE: ${{ inputs.release_candidate }}
      OLD_DATABASE_URL: ${{ secrets.OLD_DATABASE_URL }}
      NEW_DATABASE_URL: ${{ secrets.NEW_DATABASE_URL }}
      NEW_AVATAR_DIR: ${{ vars.NEW_AVATAR_DIR || secrets.NEW_AVATAR_DIR }}
      RELEASE_ARTIFACT_DIR: tmp/release-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
      - name: Run migration gates
        run: CARGO_OFFLINE=false scripts/test-migration.sh
      - name: Upload migration release reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-migration
          path: tmp/release-gate
          if-no-files-found: ignore

  tauri-app:
    name: Tauri app bundle
    needs: release-candidate-preflight
    runs-on: macos-14
    if: ${{ inputs.run_tauri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/web/package-lock.json
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> apps/desktop/src-tauri/target
      - name: Install frontend dependencies
        run: bash scripts/install-frontend-deps.sh
      - name: Check Tauri runtime contract
        run: scripts/test-tauri-contract.sh
      - name: Build Tauri app bundle
        env:
          TAURI_SIDECAR_DATABASE_URL: ${{ secrets.TAURI_SIDECAR_DATABASE_URL || secrets.DATABASE_URL }}
          RELEASE_ARTIFACT_DIR: tmp/release-gate
        run: CARGO_NET_OFFLINE=false RELEASE_GATE=${{ inputs.release_candidate }} RUN_TAURI=true RUN_TAURI_DMG=${{ inputs.run_tauri_dmg }} RUN_TAURI_SIDECAR_SMOKE=${{ inputs.run_tauri_sidecar_smoke }} scripts/test-tauri-build.sh
      - name: Upload macOS app bundle
        uses: actions/upload-artifact@v4
        with:
          name: tauri-macos-app
          path: apps/desktop/src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error
      - name: Upload Tauri release reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-tauri
          path: tmp/release-gate
          if-no-files-found: ignore
      - name: Upload macOS DMG bundle
        if: ${{ inputs.run_tauri_dmg }}
        uses: actions/upload-artifact@v4
        with:
          name: tauri-macos-dmg
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  docker-release:
    name: Docker release gate
    needs: release-candidate-preflight
    runs-on: ubuntu-latest
    if: ${{ inputs.run_docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node for Docker E2E
        if: ${{ inputs.run_docker_e2e }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/web/package-lock.json
      - name: Install frontend dependencies for Docker E2E
        if: ${{ inputs.run_docker_e2e }}
        run: bash scripts/install-frontend-deps.sh
      - name: Install Playwright browser for Docker E2E
        if: ${{ inputs.run_docker_e2e }}
        run: npx --prefix apps/desktop/web playwright install --with-deps chromium
      - name: Build Docker images and run compose gate
        run: RELEASE_GATE=${{ inputs.release_candidate }} RELEASE_ARTIFACT_DIR=tmp/release-gate RUN_DOCKER_E2E=${{ inputs.run_docker_e2e }} scripts/test-docker.sh
      - name: Upload Docker release reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-docker
          path: tmp/release-gate
          if-no-files-found: ignore

  release-gate-summary:
    name: Release candidate summary
    needs:
      - release-candidate-preflight
      - backend
      - frontend
      - frontend-e2e
      - migration
      - tauri-app
      - docker-release
    runs-on: ubuntu-latest
    if: ${{ always() && inputs.release_candidate }}
    steps:
      - name: Summarize required release gates
        env:
          PREFLIGHT_RESULT: ${{ needs.release-candidate-preflight.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          FRONTEND_E2E_RESULT: ${{ needs.frontend-e2e.result }}
          MIGRATION_RESULT: ${{ needs.migration.result }}
          TAURI_RESULT: ${{ needs.tauri-app.result }}
          DOCKER_RESULT: ${{ needs.docker-release.result }}
        run: |
          failed=0

          require_success() {
            local result="$1"
            local label="$2"
            if [[ "$result" != "success" ]]; then
              echo "FAIL: ${label} result is ${result}; release candidate is not shippable."
              failed=1
            fi
          }

          {
            echo "## Release candidate gate summary"
            echo
            echo "| Required job | Result |"
            echo "| --- | --- |"
            echo "| release-candidate-preflight | ${PREFLIGHT_RESULT} |"
            echo "| backend | ${BACKEND_RESULT} |"
            echo "| frontend | ${FRONTEND_RESULT} |"
            echo "| frontend-e2e | ${FRONTEND_E2E_RESULT} |"
            echo "| migration | ${MIGRATION_RESULT} |"
            echo "| tauri-app | ${TAURI_RESULT} |"
            echo "| docker-release | ${DOCKER_RESULT} |"
          } >> "$GITHUB_STEP_SUMMARY"

          require_success "$PREFLIGHT_RESULT" "release-candidate-preflight"
          require_success "$BACKEND_RESULT" "backend"
          require_success "$FRONTEND_RESULT" "frontend"
          require_success "$FRONTEND_E2E_RESULT" "frontend-e2e"
          require_success "$MIGRATION_RESULT" "migration"
          require_success "$TAURI_RESULT" "tauri-app"
          require_success "$DOCKER_RESULT" "docker-release"

          if [[ "$failed" -ne 0 ]]; then
            exit 1
          fi

          echo "GitHub release candidate summary passed."
